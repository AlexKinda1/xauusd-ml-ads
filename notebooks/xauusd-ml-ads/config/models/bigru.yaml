name: bigru
family: dl
input_format: sequence

architecture:
  hidden_size: 128
  num_layers: 2
  bidirectional: true
  dropout: 0.3
  fc_hidden: 64

training:
  batch_size: 64
  epochs: 100
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 1e-5
  scheduler: cosine
  early_stopping_patience: 10
  gradient_clip: 1.0

optuna:
  search_space:
    hidden_size: [64, 256]
    num_layers: [1, 3]
    dropout: [0.1, 0.5]
    learning_rate: [1e-4, 1e-2, "log"]
